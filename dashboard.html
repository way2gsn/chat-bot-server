<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Phasal Bazar — Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0C1610;
  --surface:   #132018;
  --surface2:  #1A2B1E;
  --border:    #243829;
  --border2:   #2E4A35;
  --text:      #C8E6C0;
  --text2:     #6B9470;
  --text3:     #3D5E42;
  --accent:    #4CAF65;
  --accent2:   #2D7A45;
  --pending:   #F59E0B;
  --confirmed: #22C55E;
  --delivered: #818CF8;
  --cancelled: #F87171;
  --font: 'Plus Jakarta Sans', sans-serif;
  --font-display: 'Fraunces', serif;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── LOGIN ── */
#login {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  background: radial-gradient(ellipse at 50% 0%, #1a3d22 0%, var(--bg) 70%);
}
.lcard {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px 32px 36px;
  width: 100%; max-width: 380px;
  text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,.5);
}
.lcard .logo { font-size: 52px; display:block; margin-bottom:6px; filter: drop-shadow(0 4px 14px rgba(76,175,101,.4)); }
.lcard h1 { font-family: var(--font-display); font-size: 26px; font-weight:700; letter-spacing:-.5px; margin-bottom:4px; }
.lcard p  { color: var(--text2); font-size:13px; font-weight:500; margin-bottom:28px; }
.lcard input {
  width:100%; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px 14px; color: var(--text);
  font-size:14px; font-family:var(--font);
  outline:none; margin-bottom:10px;
  transition: border-color .2s;
}
.lcard input:focus { border-color: var(--accent2); }
.lcard input::placeholder { color: var(--text3); }
.lbtn {
  width:100%; background: var(--accent); border:none; border-radius:10px;
  padding:13px; color:#0C1610; font-size:15px; font-weight:800;
  font-family:var(--font); cursor:pointer; letter-spacing:.3px;
  transition: background .2s, transform .1s; margin-top:4px;
}
.lbtn:hover  { background: #5dbf74; }
.lbtn:active { transform: scale(.98); }
.lerr { color: #F87171; font-size:12px; font-weight:500; margin-bottom:10px; min-height:18px; }

/* ── APP SHELL ── */
#app { display: none; }

/* ── HEADER ── */
.hdr {
  position: sticky; top:0; z-index:100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 11px 16px;
  display: flex; justify-content:space-between; align-items:center; gap:10px;
}
.hdr-brand { display:flex; align-items:center; gap:10px; }
.hdr-brand .logo { font-size:22px; }
.hdr-brand h2 { font-family:var(--font-display); font-size:18px; font-weight:700; letter-spacing:-.3px; }
.hdr-brand sub { display:block; font-size:10px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:1.2px; }
.hdr-right { display:flex; align-items:center; gap:8px; }
.sync-tag { font-size:11px; color:var(--text3); font-weight:500; display:none; }
@media(min-width:480px){ .sync-tag { display:block; } }
.ibtn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); border-radius:8px; padding:7px 12px;
  font-size:12px; font-weight:600; font-family:var(--font);
  cursor:pointer; transition: background .15s, color .15s;
}
.ibtn:hover { background:var(--border); color:var(--text); }

/* ── WRAP ── */
.wrap { max-width:900px; margin:0 auto; padding:14px 12px 40px; }
@media(min-width:600px){ .wrap { padding:20px 20px 48px; } }

/* ── STATS ── */
.stats {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:8px; margin-bottom:16px;
}
@media(min-width:720px){ .stats { grid-template-columns: repeat(6, 1fr); } }
.stat {
  background: var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:12px 12px 10px;
  transition: border-color .2s;
}
.stat:hover { border-color:var(--border2); }
.stat-i  { font-size:18px; margin-bottom:5px; }
.stat-v  { font-size:20px; font-weight:800; color:var(--text); letter-spacing:-.5px; line-height:1.1; }
.stat-l  { font-size:10px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; margin-top:3px; }
.stat-s  { font-size:10px; color:var(--text3); font-weight:500; margin-top:2px; }

/* ── TOOLBAR ── */
.toolbar { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
@media(min-width:600px){ .toolbar { flex-direction:row; align-items:center; } }
.filters { display:flex; gap:6px; flex-wrap:wrap; }
.pill {
  background:var(--surface); border:1.5px solid var(--border);
  color:var(--text2); border-radius:20px; padding:5px 12px;
  font-size:12px; font-weight:600; font-family:var(--font);
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.pill:hover { border-color:var(--border2); color:var(--text); }
.pill.on    { background:var(--accent2); border-color:var(--accent); color:#fff; }
.search-wrap { flex:1; position:relative; min-width:0; }
.search-ico {
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  pointer-events:none; color:var(--text3); font-size:14px;
}
.search {
  width:100%; background:var(--surface); border:1.5px solid var(--border);
  border-radius:8px; padding:8px 12px 8px 32px;
  color:var(--text); font-size:13px; font-family:var(--font); font-weight:500;
  outline:none; transition:border-color .2s;
}
.search:focus { border-color:var(--accent2); }
.search::placeholder { color:var(--text3); }
.count-row {
  font-size:11px; font-weight:700; color:var(--text3);
  margin-bottom:8px; padding-left:2px;
  text-transform:uppercase; letter-spacing:.9px;
}

/* ── CARD ── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; margin-bottom:8px; overflow:hidden;
  transition: border-color .2s;
}
.card:hover { border-color:var(--border2); }
.card[data-status="pending"]   { border-left:3px solid var(--pending);   }
.card[data-status="confirmed"] { border-left:3px solid var(--confirmed); }
.card[data-status="delivered"] { border-left:3px solid var(--delivered); }
.card[data-status="cancelled"] { border-left:3px solid var(--cancelled); opacity:.65; }

.card-head {
  display:flex; justify-content:space-between; align-items:flex-start;
  gap:10px; padding:14px 16px 10px;
}
.card-meta  { min-width:0; flex:1; }
.oid  { font-size:12px; font-weight:700; color:var(--text); font-family:'Courier New',monospace; letter-spacing:.3px; }
.ph   { font-size:12px; font-weight:600; color:var(--text2); margin-top:3px; }
.dt   { font-size:11px; color:var(--text3); margin-top:2px; font-weight:500; }
.card-right { text-align:right; flex-shrink:0; }
.total  { font-size:22px; font-weight:800; color:var(--text); letter-spacing:-.5px; line-height:1.1; }
.badges { display:flex; gap:5px; justify-content:flex-end; flex-wrap:wrap; margin-top:6px; }
.badge  {
  display:inline-flex; align-items:center; gap:3px;
  border-radius:20px; padding:3px 9px;
  font-size:11px; font-weight:700; letter-spacing:.2px;
}

/* Items */
.card-items {
  margin:0 14px 10px; background:var(--bg);
  border-radius:8px; border:1px solid var(--border); overflow:hidden;
}
.items-lbl {
  font-size:10px; font-weight:700; color:var(--text3);
  text-transform:uppercase; letter-spacing:1px;
  padding:7px 12px 5px; border-bottom:1px solid var(--border);
}
.item-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 12px; border-bottom:1px solid var(--border); gap:8px;
}
.item-row:last-child { border-bottom:none; }
.item-n { font-size:13px; color:var(--text2); font-weight:500; min-width:0; flex:1; }
.item-n strong { color:var(--text); font-weight:600; }
.item-p { font-size:13px; font-weight:700; color:var(--text); flex-shrink:0; }

/* Address */
.card-addr {
  margin:0 14px 10px; background:var(--bg);
  border:1px solid var(--border); border-radius:8px;
  padding:8px 12px; font-size:12px; font-weight:500; color:var(--text2);
  display:flex; gap:7px; align-items:flex-start;
}
.card-addr .pin { font-size:13px; flex-shrink:0; margin-top:1px; }

/* Actions */
.card-actions { padding:2px 14px 12px; display:flex; gap:7px; flex-wrap:wrap; }
.abtn {
  border-radius:8px; padding:7px 14px; font-size:12px; font-weight:700;
  font-family:var(--font); cursor:pointer;
  border-width:1.5px; border-style:solid;
  transition: opacity .15s, transform .1s; letter-spacing:.2px;
}
.abtn:hover  { opacity:.85; }
.abtn:active { transform:scale(.97); }

/* Empty */
.empty { text-align:center; padding:64px 20px; color:var(--text3); }
.empty .ei { font-size:44px; display:block; margin-bottom:12px; opacity:.4; }
.empty p { font-size:14px; font-weight:600; }

/* Shimmer */
.shimmer {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size:200% 100%;
  animation: shim 1.4s infinite;
  border-radius:12px; height:88px; margin-bottom:8px;
}
@keyframes shim { to { background-position: -200% 0; } }

::-webkit-scrollbar       { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:10px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <span class="logo">🌾</span>
    <h1>Phasal Bazar</h1>
    <p>Order Management Dashboard</p>
    <input type="text"     id="apiUrl"  placeholder="Railway URL  https://….railway.app" autocomplete="off"/>
    <input type="password" id="apiPass" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app">
  <header class="hdr">
    <div class="hdr-brand">
      <span class="logo">🌾</span>
      <div><h2>Phasal Bazar</h2><sub>Orders</sub></div>
    </div>
    <div class="hdr-right">
      <span class="sync-tag" id="syncTime"></span>
      <button class="ibtn" onclick="load()">↻ Refresh</button>
      <button class="ibtn" onclick="logout()">Exit</button>
    </div>
  </header>

  <main class="wrap">
    <div class="stats" id="stats">
      <div class="shimmer"></div><div class="shimmer"></div>
      <div class="shimmer"></div><div class="shimmer"></div>
      <div class="shimmer"></div><div class="shimmer"></div>
    </div>
    <div class="toolbar">
      <div class="filters" id="filters"></div>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search" id="search" placeholder="Phone or Order ID…" oninput="renderOrders()"/>
      </div>
    </div>
    <div class="count-row" id="count"></div>
    <div id="orders"></div>
  </main>
</div>

<script>
let API="", TOKEN="", allOrders=[], statsData={}, activeFilter="all";

const STATUS = {
  pending:   { label:"Pending",   color:"#F59E0B", bg:"rgba(245,158,11,.15)",  icon:"⏳" },
  confirmed: { label:"Confirmed", color:"#22C55E", bg:"rgba(34,197,94,.12)",   icon:"✅" },
  delivered: { label:"Delivered", color:"#818CF8", bg:"rgba(129,140,248,.15)", icon:"📦" },
  cancelled: { label:"Cancelled", color:"#F87171", bg:"rgba(248,113,113,.15)", icon:"❌" },
};
const PAYMENT = {
  UPI: { color:"#C084FC", bg:"rgba(192,132,252,.15)", icon:"💳" },
  COD: { color:"#FCD34D", bg:"rgba(252,211,77,.12)",  icon:"💵" },
};
const FILTERS = [
  {id:"all",       label:"All"},
  {id:"pending",   label:"⏳ Pending"},
  {id:"confirmed", label:"✅ Confirmed"},
  {id:"delivered", label:"📦 Done"},
  {id:"cancelled", label:"❌ Cancelled"},
];

async function doLogin() {
  const url  = document.getElementById("apiUrl").value.trim().replace(/\/$/, "");
  const pass = document.getElementById("apiPass").value.trim();
  if (!url || !pass) { showErr("Fill in both fields"); return; }
  const btn = document.querySelector(".lbtn");
  btn.textContent = "Connecting…"; btn.disabled = true;
  try {
    const r = await fetch(`${url}/admin/stats`, { headers:{ Authorization:`Bearer ${pass}` }});
    if (!r.ok) { showErr("Wrong password or server unreachable"); btn.textContent="Sign In →"; btn.disabled=false; return; }
    API = url; TOKEN = pass;
    try { localStorage.setItem("pb_api", API); localStorage.setItem("pb_token", TOKEN); } catch{}
    showDashboard(); load();
  } catch(e) {
    showErr("Cannot connect. Check Railway URL.");
    btn.textContent="Sign In →"; btn.disabled=false;
  }
}

function showErr(msg) { document.getElementById("lerr").textContent = "⚠️ " + msg; }

function logout() {
  try { localStorage.removeItem("pb_token"); } catch{}
  document.getElementById("login").style.display="flex";
  document.getElementById("app").style.display="none";
}

function showDashboard() {
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  buildFilters();
}

function buildFilters() {
  document.getElementById("filters").innerHTML = FILTERS.map(f =>
    `<button class="pill ${f.id===activeFilter?'on':''}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join("");
}

function setFilter(id) { activeFilter=id; buildFilters(); renderOrders(); }

async function load() {
  try {
    const [oRes, sRes] = await Promise.all([
      fetch(`${API}/admin/orders`, { headers:{ Authorization:`Bearer ${TOKEN}` }}),
      fetch(`${API}/admin/stats`,  { headers:{ Authorization:`Bearer ${TOKEN}` }}),
    ]);
    allOrders = await oRes.json();
    statsData = await sRes.json();
    renderStats(); renderOrders();
    document.getElementById("syncTime").textContent = "Synced " + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById("syncTime").textContent = "⚠️ Failed";
  }
}
setInterval(load, 30000);

function renderStats() {
  const s = statsData;
  document.getElementById("stats").innerHTML = [
    stat("📦", "Total",     s.total),
    stat("⏳", "Pending",   s.pending,    (s.todayOrders||0)+" today"),
    stat("✅", "Confirmed", s.confirmed),
    stat("🛵", "Delivered", s.delivered),
    stat("💰", "Revenue",   "₹"+(s.totalRevenue||0), "₹"+(s.todayRevenue||0)+" today"),
    stat("🏪", "COD / UPI", (s.codOrders||0)+" / "+(s.upiOrders||0)),
  ].join("");
}
function stat(icon, label, val, sub="") {
  return `<div class="stat">
    <div class="stat-i">${icon}</div>
    <div class="stat-v">${val}</div>
    <div class="stat-l">${label}</div>
    ${sub ? `<div class="stat-s">${sub}</div>` : ""}
  </div>`;
}

function renderOrders() {
  const search = document.getElementById("search").value.toLowerCase();
  let list = allOrders;
  if (activeFilter !== "all") list = list.filter(o => o.orderStatus === activeFilter);
  if (search) list = list.filter(o =>
    (o.orderId||"").toLowerCase().includes(search) ||
    (o.customerPhone||"").includes(search)
  );
  document.getElementById("count").textContent = list.length + " order" + (list.length!==1?"s":"");
  if (!list.length) {
    document.getElementById("orders").innerHTML = `<div class="empty"><span class="ei">📭</span><p>No orders found</p></div>`;
    return;
  }
  document.getElementById("orders").innerHTML = list.map(orderCard).join("");
}

function orderCard(o) {
  const s = STATUS[o.orderStatus]    || STATUS.pending;
  const p = PAYMENT[o.paymentMethod] || PAYMENT.COD;
  const date = o.createdAt ? new Date(o.createdAt).toLocaleString("en-IN", {
    day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit"
  }) : "";

  let items = [];
  if (Array.isArray(o.items)) items = o.items;
  else if (typeof o.items === "string") { try { items = JSON.parse(o.items); } catch {} }

  const itemsHtml = items.length
    ? items.map(i => `
      <div class="item-row">
        <span class="item-n">${i.emoji||"🌾"} <strong>${i.name}</strong> × ${i.qty}</span>
        <span class="item-p">₹${i.subtotal}</span>
      </div>`).join("")
    : `<div class="item-row"><span class="item-n" style="color:var(--text3)">No item details</span></div>`;

  const addrHtml = o.address
    ? `<div class="card-addr"><span class="pin">📍</span><span>${o.address}</span></div>` : "";

  const actions = o.orderStatus === "pending"
    ? `<button class="abtn" style="color:#22C55E;border-color:#22C55E;background:rgba(34,197,94,.1)" onclick="update('${o.orderId}','confirmed')">✅ Confirm</button>
       <button class="abtn" style="color:#F87171;border-color:#F87171;background:rgba(248,113,113,.1)" onclick="update('${o.orderId}','cancelled')">✕ Cancel</button>`
    : o.orderStatus === "confirmed"
    ? `<button class="abtn" style="color:#818CF8;border-color:#818CF8;background:rgba(129,140,248,.1)" onclick="update('${o.orderId}','delivered')">📦 Delivered</button>`
    : `<span style="color:var(--text3);font-size:12px;font-weight:500">—</span>`;

  return `
  <div class="card" data-status="${o.orderStatus}">
    <div class="card-head">
      <div class="card-meta">
        <div class="oid">${o.orderId}</div>
        <div class="ph">📱 ${o.customerPhone}</div>
        <div class="dt">${date}</div>
      </div>
      <div class="card-right">
        <div class="total">₹${o.total}</div>
        <div class="badges">
          <span class="badge" style="color:${p.color};background:${p.bg}">${p.icon} ${o.paymentMethod}</span>
          <span class="badge" style="color:${s.color};background:${s.bg}">${s.icon} ${s.label}</span>
        </div>
      </div>
    </div>
    <div class="card-items">
      <div class="items-lbl">Items Ordered</div>
      ${itemsHtml}
    </div>
    ${addrHtml}
    <div class="card-actions">${actions}</div>
  </div>`;
}

async function update(orderId, status) {
  try {
    await fetch(`${API}/admin/orders/${orderId}`, {
      method:"PATCH",
      headers:{ Authorization:`Bearer ${TOKEN}`, "Content-Type":"application/json" },
      body: JSON.stringify({ orderStatus: status }),
    });
    await load();
  } catch(e) { alert("Update failed. Check connection."); }
}

window.onload = function() {
  let a, t;
  try { a = localStorage.getItem("pb_api"); t = localStorage.getItem("pb_token"); } catch{}
  if (a && t) {
    document.getElementById("apiUrl").value  = a;
    document.getElementById("apiPass").value = t;
    API = a; TOKEN = t;
    showDashboard(); load();
  }
};
</script>
</body>
</html>
